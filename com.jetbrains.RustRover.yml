app-id: com.jetbrains.RustRover
command: rustrover
runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
separate-locales: false
tags:
  - proprietary

finish-args:
  - --allow=devel
  - --device=all
  - --env=IDEA_PROPERTIES=/app/bin/idea.properties
  - --filesystem=host
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --filesystem=xdg-run/docker
  - --filesystem=xdg-run/keyring
  - --filesystem=xdg-run/podman
  - --share=ipc
  - --share=network
  - --socket=gpg-agent
  - --socket=ssh-auth
  - --socket=fallback-x11
  - --socket=wayland
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.gnome.keyring.SystemPrompter

modules:
  - name: jetbrains-flatpak-wrapper
    buildsystem: meson
    config-opts:
      - -Deditor_binary=/app/bin/rustrover
      - -Deditor_title=RustRover
      - -Dprogram_name=rustrover
    sources:
      - type: git
        url: https://github.com/flathub-infra/ide-flatpak-wrapper.git
        commit: 2881abaf9efc6e14923b8a0bb085275aaf2fbddf

  - name: rsync
    cleanup:
      - /share/man
    config-opts:
      - --disable-debug
      - --disable-md2man
      - --disable-xxhash
      - --prefix=${FLATPAK_DEST}
      - --with-included-popt
      - --with-included-zlib
    sources:
      - type: archive
        url: https://download.samba.org/pub/rsync/src/rsync-3.4.4.tar.gz
        sha256: bd88cf82fa653da32314fb229136407c5c90f80d1758d8f4b091767877d8fa96
        x-checker-data:
          project-id: 4217
          stable-only: true
          type: anitya
          url-template: https://download.samba.org/pub/rsync/src/rsync-$version.tar.gz

  # -----------------------------------------------------------------------------------------------
  #
  # -----------------------------------------------------------------------------------------------

  - name: RustRover
    buildsystem: simple
    build-commands:
      - cp -a RustRover-*/* ${FLATPAK_DEST}
      - install -D -m644 -t ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/ ${FLATPAK_ID}.svg
      - install -D -m644 -t ${FLATPAK_DEST}/share/applications/ ${FLATPAK_ID}.desktop
      - install -D -m644 -t ${FLATPAK_DEST}/share/metainfo/ ${FLATPAK_ID}.appdata.xml
      - cat idea.properties | tee -a ${FLATPAK_DEST}/bin/idea.properties
    sources:
      - type: archive
        strip-components: 0
        only-arches:
          - x86_64
        url: https://download.jetbrains.com/rustrover/RustRover-2026.2.tar.gz
        sha256: c4783477bc1d95c5f2ddcff949395669ea2e577acc04435107594ba994ae96a1
        x-checker-data:
          type: jetbrains
          code: RR
          is-main-source: true
      - type: archive
        strip-components: 0
        only-arches:
          - aarch64
        url: https://download.jetbrains.com/rustrover/RustRover-2026.2-aarch64.tar.gz
        sha256: 594f8e78c669f5ff1090d6c0d99298c981b992deb928ebda034d374a4b240a8c
        x-checker-data:
          type: jetbrains
          code: RR
          is-main-source: true
      - type: file
        path: com.jetbrains.RustRover.appdata.xml
      - type: file
        path: com.jetbrains.RustRover.desktop
      - type: file
        path: com.jetbrains.RustRover.svg
      - type: file
        path: idea.properties
