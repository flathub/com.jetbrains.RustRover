app-id: com.jetbrains.RustRover
command: rustrover
runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
separate-locales: false
tags:
  - proprietary

finish-args:
  - --allow=devel
  - --device=all
  - --env=RUST_ROVER_PROPERTIES=/app/bin/idea.properties
  - --filesystem=host
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --filesystem=xdg-run/docker
  - --filesystem=xdg-run/keyring
  - --filesystem=xdg-run/podman
  - --share=ipc
  - --share=network
  - --socket=gpg-agent
  - --socket=ssh-auth
  - --socket=x11
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.gnome.keyring.SystemPrompter

modules:
  - name: jetbrains-flatpak-wrapper
    buildsystem: meson
    config-opts:
      - -Deditor_binary=/app/extra/rustrover/bin/rustrover
      - -Deditor_title=RustRover
      - -Dprogram_name=rustrover
    sources:
      - type: git
        url: https://github.com/flathub-infra/ide-flatpak-wrapper.git
        commit: d581fd9b873acbf6fb22899aa388435f6c00f61a

  - name: rsync
    cleanup:
      - /share/man
    config-opts:
      - --disable-debug
      - --disable-md2man
      - --disable-xxhash
      - --prefix=${FLATPAK_DEST}
      - --with-included-popt
      - --with-included-zlib
    sources:
      - type: archive
        url: https://download.samba.org/pub/rsync/src/rsync-3.4.4.tar.gz
        sha256: bd88cf82fa653da32314fb229136407c5c90f80d1758d8f4b091767877d8fa96
        x-checker-data:
          project-id: 4217
          stable-only: true
          type: anitya
          url-template: https://download.samba.org/pub/rsync/src/rsync-$version.tar.gz

  # -----------------------------------------------------------------------------------------------
  #
  # -----------------------------------------------------------------------------------------------

  - name: RustRover
    buildsystem: simple
    build-commands:
      - install -D apply_extra /app/bin/apply_extra
      - install -D -m644 -t ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/ ${FLATPAK_ID}.svg
      - install -D -m644 -t ${FLATPAK_DEST}/share/applications/ ${FLATPAK_ID}.desktop
      - install -D -m644 -t ${FLATPAK_DEST}/share/metainfo/ ${FLATPAK_ID}.appdata.xml
      - cat idea.properties | tee -a ${FLATPAK_DEST}/bin/idea.properties
    sources:
      - type: script
        dest-filename: apply_extra
        commands:
          - mkdir rustrover/
          - tar -xzf rustrover.tar.gz --directory=rustrover/ --strip-components=1
          - rm rustrover.tar.gz
      - type: file
        path: com.jetbrains.RustRover.appdata.xml
      - type: file
        path: com.jetbrains.RustRover.desktop
      - type: file
        path: com.jetbrains.RustRover.svg
      - type: file
        path: idea.properties
      - type: extra-data
        filename: rustrover.tar.gz
        sha256: d3ebf4e73c6f16a5d5d7773ca15f5d4d3c2d3beb21832c03ef973052264069bd
        size: 1208229832
        url: https://download.jetbrains.com/rustrover/RustRover-2026.1.3.tar.gz
        only-arches:
          - x86_64
        x-checker-data:
          type: jetbrains
          code: RR
          is-main-source: true
      - type: extra-data
        filename: rustrover.tar.gz
        sha256: 499e0e91680019e49a7c5a359a5e5dbf9b4de6cbbe1e0cdb1214391b33ea19da
        size: 1202038164
        url: https://download.jetbrains.com/rustrover/RustRover-2026.1.3-aarch64.tar.gz
        only-arches:
          - aarch64
        x-checker-data:
          type: jetbrains
          code: RR
          is-main-source: true
